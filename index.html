<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kairo Property Intelligence — 3D Premium UAE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />
<script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
<style>
/* --- GLOBAL & VARIABLES --- */
:root {
  --gold: #d8b46b;
  --gold-l: #f5e4bf;
  --bg: #05101d;
  --bg2: #08152a;
  --panel: rgba(5,12,26,.90);
  --panel2: rgba(7,18,35,.92);
  --line: rgba(255,255,255,.08);
  --text: #f6f9ff;
  --muted: #95a7c6;
  --muted2: #6f84a7;
  --Dubai: #eb8450;
  --AbuDhabi: #64b2ff;
  --Sharjah: #a784f7;
  --Ajman: #59d8a3;
  --UAQ: #f0c85e;
  --RAK: #ff7997;
  --Fujairah: #66d7ef;
  --sidebar-w: 272px;
}
* { box-sizing: border-box; }
html, body { height:100%; margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; overflow:hidden; }
body::before {
  content:''; position:fixed; inset:0;
  background:radial-gradient(circle at 15% 10%,rgba(100,178,255,.12),transparent 24%),
             radial-gradient(circle at 85% 8%,rgba(216,180,107,.12),transparent 18%),
             linear-gradient(180deg,#05101d 0%,#071423 52%,#04101b 100%);
  pointer-events:none; z-index:0;
}
.app { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; }

/* --- HEADER --- */
header {
  height:70px; display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; border-bottom:1px solid rgba(216,180,107,.18);
  background:linear-gradient(180deg,rgba(5,12,26,.95),rgba(6,15,30,.85));
  backdrop-filter:blur(18px);
}
.brand { display:flex; align-items:center; gap:14px; }
.brand img { height:32px; filter:drop-shadow(0 6px 18px rgba(0,0,0,.28)); }
.brand-title { font-family:'Cormorant Garamond',serif; font-size:17px; letter-spacing:.15px; color:var(--gold-l); }
.topbar { display:flex; align-items:center; gap:8px; flex:1; justify-content:flex-end; }
.pills { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.pill {
  border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.025); color:#dbe6f8;
  padding:6px 11px; border-radius:999px; font-size:10.5px; font-weight:600; cursor:pointer;
  transition:transform .24s ease,box-shadow .24s ease,background .24s ease,border-color .24s ease;
  line-height:1.05; white-space:nowrap;
}
.pill:hover, .pill.on { transform:translateY(-1px); box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 8px 18px rgba(0,0,0,.18); }
.pill.on {
  background:rgba(80,255,170,.12)!important; border-color:rgba(80,255,170,.72)!important;
  color:#bfffe4!important; box-shadow:0 0 0 1px rgba(80,255,170,.18) inset,0 0 18px rgba(80,255,170,.22),0 8px 18px rgba(0,0,0,.18)!important;
}
.pill[data-e="all"] { color:var(--gold-l); border-color:rgba(201,168,76,.42); }
.pill[data-e="Dubai"] { color:var(--Dubai); border-color:rgba(233,124,69,.42); }
.pill[data-e="Abu Dhabi"] { color:var(--AbuDhabi); border-color:rgba(98,177,255,.42); }
.pill[data-e="Sharjah"] { color:var(--Sharjah); border-color:rgba(165,123,247,.42); }
.pill[data-e="Ajman"] { color:var(--Ajman); border-color:rgba(83,213,156,.42); }
.pill[data-e="UAQ"] { color:var(--UAQ); border-color:rgba(239,195,81,.42); }
.pill[data-e="RAK"] { color:var(--RAK); border-color:rgba(255,115,143,.42); }
.pill[data-e="Fujairah"] { color:var(--Fujairah); border-color:rgba(95,213,238,.42); }

/* --- MAIN LAYOUT --- */
.main { position:relative; flex:1; min-height:0; overflow:hidden; }
.sidebar {
  position:absolute; left:0; top:0; bottom:0; width:var(--sidebar-w);
  background:linear-gradient(180deg,rgba(7,16,34,.88),rgba(5,12,25,.92));
  border-right:1px solid rgba(255,255,255,.05); backdrop-filter:blur(16px);
  display:flex; flex-direction:column; transition:transform .44s cubic-bezier(.22,.8,.2,1),opacity .28s ease;
  z-index:8; box-shadow:12px 0 30px rgba(0,0,0,.20);
}
.sidebar.collapsed { transform:translateX(calc(-100% + 46px)); }
.sidebar.collapsed .sidebar-inner { opacity:0; pointer-events:none; transform:translateX(-8px); }
.sidebar-edge {
  position:absolute; right:-20px; top:50%; transform:translateY(-50%);
  width:38px; height:98px; border-radius:0 18px 18px 0;
  background:linear-gradient(180deg,rgba(216,180,107,.24),rgba(100,178,255,.24));
  display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.18); opacity:.98;
}
.sidebar-inner { display:flex; flex-direction:column; height:100%; transition:.22s; }

/* --- SEARCH & LIST --- */
.search-wrap { padding:12px; border-bottom:1px solid var(--line); }
.search-box { position:relative; }
.search-box input {
  width:100%; padding:12px 14px 12px 38px; border-radius:14px;
  background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.08); color:#fff; font-size:13px;
  outline:none; transition:border-color .2s ease,box-shadow .2s ease;
}
.search-box input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(216,180,107,0.2); }
.search-box span { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); }
.count-bar { padding:8px 14px; color:var(--muted); font-size:12px; border-bottom:1px solid var(--line); }
.count-bar b { color:#fff; }
.area-list { flex:1; overflow:auto; padding:8px 0 18px; }
.area-list::-webkit-scrollbar { width:6px; }
.area-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:8px; }
.group-head {
  display:flex; align-items:center; gap:8px; padding:10px 14px 7px; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:800;
  position:sticky; top:0; background:linear-gradient(180deg,rgba(7,16,34,.98),rgba(7,16,34,.92));
  backdrop-filter:blur(16px); z-index:1;
}
.dot { width:9px; height:9px; border-radius:50%; }
.group-count { margin-left:auto; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.05); font-size:11px; }
.area-row {
  padding:13px 15px; border-left:2px solid transparent; border-bottom:1px solid rgba(255,255,255,.05);
  cursor:pointer; transition:background .24s ease,transform .24s ease,border-left-color .2s ease;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.area-row:hover { background:rgba(255,255,255,.03); transform:translateX(4px); }
.area-row.active { border-left-color:var(--gold); background:linear-gradient(90deg,rgba(216,180,107,.12),rgba(216,180,107,.02) 60%,transparent); }
.area-name { font-size:15px; font-weight:700; color:#f7fbff; }
.area-sub { font-size:12px; color:var(--muted); margin-top:4px; }
.empty { padding:30px 16px; color:var(--muted); }

/* --- MAP & PANEL --- */
.map-wrap { position:absolute; inset:0; min-width:0; }
#map { position:absolute; inset:0; }
.map-glass {
  position:absolute; inset:0;
  background:radial-gradient(circle at center,rgba(255,255,255,.05),transparent 55%),
             linear-gradient(180deg,rgba(2,6,12,.20),rgba(2,6,12,.10) 28%,rgba(2,6,12,.22));
  pointer-events:none; z-index:1;
}
.maplibregl-ctrl-group {
  border:none!important; background:rgba(9,18,35,.88)!important; backdrop-filter:blur(14px);
  box-shadow:0 12px 28px rgba(0,0,0,.24)!important; border-radius:14px!important;
}
.maplibregl-ctrl button { width:34px!important; height:34px!important; }
.maplibregl-ctrl button span { filter:invert(1) brightness(1.9); }
.maplibregl-ctrl button:hover { background:rgba(255,255,255,.05)!important; }

.detail-panel {
  position:absolute; top:14px; right:12px; width:300px; max-width:min(300px,calc(100vw - 120px));
  max-height:calc(100vh - 92px); overflow:auto; border-radius:22px;
  background:linear-gradient(180deg,rgba(6,16,34,.92),rgba(4,10,22,.94));
  border:1px solid rgba(255,255,255,.06); box-shadow:0 24px 72px rgba(0,0,0,.34);
  backdrop-filter:blur(18px); z-index:4;
  transition:opacity 0.4s cubic-bezier(0.2,0.9,0.3,1), transform 0.4s cubic-bezier(0.2,0.9,0.3,1);
  transform:scale(0.96); opacity:0; pointer-events:none;
}
.detail-panel.open { transform:scale(1); opacity:1; pointer-events:auto; }
.detail-panel::-webkit-scrollbar { width:5px; }
.detail-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,.10); border-radius:8px; }
.dp-hero {
  padding:15px 16px 11px; border-bottom:1px solid rgba(255,255,255,.06);
  background:radial-gradient(circle at 20% 12%,rgba(100,178,255,.16),transparent 30%),
             radial-gradient(circle at 88% 8%,rgba(216,180,107,.14),transparent 22%),
             linear-gradient(135deg,rgba(8,22,52,.96),rgba(2,8,21,.96));
}
.dp-flag {
  display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:999px;
  border:1px solid rgba(255,255,255,.14); font-size:9px; font-weight:600; letter-spacing:1.2px;
  text-transform:uppercase; color:#8ec5ff; margin-bottom:10px;
}
.dp-name { font-family:'Cormorant Garamond',serif; font-size:18px; line-height:1.02; font-weight:500; }
.dp-close {
  position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%;
  border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.03); color:#fff; cursor:pointer;
}
.dp-sec { padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.06); }
.dp-lbl { font-size:9px; color:var(--muted); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.dp-text { font-size:11.5px; line-height:1.58; color:#d5def0; font-weight:400; }
.stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
.stat { padding:9px 8px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); min-width:0; }
.stat .k { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; line-height:1.25; font-weight:500; }
.stat .v { margin-top:5px; font-size:14px; font-weight:600; color:#fff; line-height:1.15; word-break:break-word; }
.stat .s { margin-top:2px; font-size:10px; color:#8fc8ff; line-height:1.2; font-weight:400; }
.tags { display:flex; flex-wrap:wrap; gap:10px; }
.tag { padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:11px; font-weight:400; }
.highlights { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.highlight {
  padding:11px 12px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08);
  font-size:11px; display:flex; align-items:center; gap:8px; font-weight:400;
}
.hl-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(180deg,var(--gold-l),var(--gold)); box-shadow:0 0 14px rgba(216,180,107,.45); }

/* --- MARKER --- */
.community-marker {
  min-width:140px; max-width:220px; padding:8px 12px; border-radius:14px;
  background:rgba(8,20,40,.92); border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(18px); box-shadow:0 12px 24px rgba(0,0,0,.24);
}
.community-marker .m-title { font-size:13px; font-weight:600; }
.community-marker .m-sub { margin-top:3px; font-size:10px; color:#92b4dc; }

/* --- RESPONSIVE --- */
@media (max-width:1100px) {
  .sidebar { width:260px; }
  .detail-panel { width:400px; max-width:calc(100vw - 300px); }
  .stats { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:980px) {
  header { height:auto; padding:10px 12px; flex-direction:column; align-items:flex-start; }
  .topbar { width:100%; justify-content:flex-start; }
  .pills { overflow-x:auto; max-width:100%; padding-bottom:2px; }
  .sidebar { width:240px; }
  .detail-panel { left:10px; right:10px; width:auto; max-width:none; top:auto; bottom:10px; max-height:56vh; }
  .dp-name { font-size:18px; }
}
</style>
</head>

<div class="app">
  <header>
    <div class="brand"><img src="https://krorealty.com/logo.png" alt="Kairo"><div class="brand-title">Property Intelligence</div></div>

</div>

<!-- Data file first -->

<!-- Main script -->
<script>
// --- CONFIG ---
maptilersdk.config.apiKey = 'hJdbBzqEvo5ediAUVCy0';

// --- DATA (from your areas_data_exact_v6_FULL_361.js) ---
// We assume window.AREAS is already defined by the external script.

// --- COMPLETE ALIAS MAP for Abu Dhabi mismatches (covers all 35 from report) ---
const NAME_ALIASES = {
  "Al Raha Gardens": "AL RAHAH",
  "Al Raha Beach": "AL RAHAH",
  "Khalifa City A": "KHALIFA CITY",
  "Khalifa City B": "KHALIFA INDUSTRIAL",
  "Mohammed Bin Zayed City": "MOHAMED BIN ZAYED CITY",
  "Masdar City": "AL MATAR",
  "Al Shamkha": "AL SHAMKHAH",
  "Shakhbout City": "SHAKHBOUT CITY",
  "Zayed City": "ZAYED CITY",
  "Al Mushrif": "AL MUSHRIF",
  "Al Karamah": "AL BIHOUTH",
  "Al Manhal": "AL MANHAL",
  "Al Nahyan": "AL NAHYAN",
  "Al Rowdah": "AL RAWDAH",
  "Al Zahiyah": "AL ZAHIYAH",
  "Al Khalidiyah": "AL KHALIDIYYA",
  "Al Bateen": "AL BATEEN",
  "Al Markaziyah": "AL DANAH",
  "Al Corniche": "AL RAS AL AKHDAR",
  "Al Hosn": "HAI AL HISN",
  "Al Mina": "AL MINAYMAH",
  "Madinat Zayed": "MADINAT ZAYED",
  "Al Muroor": "AL MUNTAZAH",
  "Al Wahdah": "AL NAHYAN",
  "Al Manaseer": "AL BATEEN",
  "Al Falah": "AL FALAH",
  "Baniyas East": "BANI YAS",
  "Baniyas West": "BANI YAS",
  "Al Bahia": "AL BAHYAH",
  "Al Jubail Island": "AL JUBAIL ISLAND",
  "Hudayriyat Island": "AL HIDAYRIYYAT ISLAND",
  "Sas Al Nakhl": "SAS AL NAKHL",
  "Al Zaab": "AL KASIR",
  "Officers City": "ZAYED MILITARY CITY",
  "Delma Island": "DELMA ISLAND",
  "Al Ain Al Jimi": "SHAREAT AL JIMI",
  "Al Ain Al Muwaiji": "AL MUWAIJI",
  "Al Ain Zakher": "RAMLAT ZAKHER",
  "Al Ain Al Towayya": "AL TIWAYYA"
};

// --- Helper functions ---
function slug(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'').trim(); }

const ECOL = {
  'Dubai':'#eb8450', 'Abu Dhabi':'#64b2ff', 'Sharjah':'#a784f7',
  'Ajman':'#59d8a3', 'UAQ':'#f0c85e', 'RAK':'#ff7997', 'Fujairah':'#66d7ef'
};
function colorFor(em) { return ECOL[em] || '#d8b46b'; }
function emirateLabel(v) { return { 'UAQ':'Umm Al Quwain', 'RAK':'Ras Al Khaimah' }[v] || v; }

// --- Build merged AREAS list from window.AREAS (assumed loaded) ---
const AREAS = window.AREAS || [];

// --- Local boundary pack and emirates boundaries ---
let localPack = null;
let emiratesGeo = null;
let isStyleReady = false;
let selectedMarker = null;
let selectedArea = null;
let selectedEmirate = 'all';

const map = new maptilersdk.Map({
  container: 'map',
  style: maptilersdk.MapStyle.STREETS.DARK,
  center: [54.45, 24.47],
  zoom: 8.55,
  pitch: 50,
  bearing: -10,
  antialias: true
});

map.on('style.load', () => {
  isStyleReady = true;
  // Add terrain source using MapTiler API key
  map.addSource('mapbox-dem', {
    type: 'raster-dem',
    url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${maptilersdk.config.apiKey}`,
    tileSize: 512
  });
  map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });

  map.setFog({
    range: [0.5, 10],
    color: '#06111e',
    'high-color': '#0c1a2b',
    'space-color': '#02060d',
    'horizon-blend': 0.08
  });

  ensure3DBuildings();
  enforceEnglishLabels();

  if (localPack && selectedArea) selectArea(selectedArea, false);
  if (emiratesGeo) drawEmirates();
});

function enforceEnglishLabels() {
  const layers = map.getStyle().layers || [];
  layers.forEach(l => {
    if (l.type === 'symbol' && l.layout && l.layout['text-field']) {
      try {
        map.setLayoutProperty(l.id, 'text-field', ['coalesce', ['get', 'name:en'], ['get', 'name_en'], ['get', 'name']]);
      } catch(e) {}
    }
  });
}

function ensure3DBuildings() {
  if (!isStyleReady) return;
  if (map.getLayer('kairo-3d-buildings')) return;
  const layers = map.getStyle().layers || [];
  const buildingLayer = layers.find(l => l['source-layer'] === 'building');
  const labelLayer = layers.find(l => l.type === 'symbol' && l.layout && l.layout['text-field']);
  if (!buildingLayer) return;
  try {
    map.addLayer({
      id: 'kairo-3d-buildings',
      type: 'fill-extrusion',
      source: buildingLayer.source,
      'source-layer': 'building',
      minzoom: 13,
      filter: ['all', ['==', ['geometry-type'], 'Polygon']],
      paint: {
        'fill-extrusion-color': [
          'interpolate', ['linear'], ['zoom'],
          13, '#e0e8ff',
          16, '#c0d0ff'
        ],
        'fill-extrusion-height': ['coalesce', ['to-number', ['get', 'render_height']], ['to-number', ['get', 'height']], 8],
        'fill-extrusion-base': ['coalesce', ['to-number', ['get', 'render_min_height']], ['to-number', ['get', 'min_height']], 0],
        'fill-extrusion-opacity': 0.92,
        'fill-extrusion-vertical-gradient': true
      }
    }, labelLayer ? labelLayer.id : undefined);
  } catch(e) { console.warn('3D building layer failed', e); }
}

// --- Load local boundary pack and emirates ---
(async () => {
  try {
    const [packRes, emiratesRes] = await Promise.all([
      fetch('./uae_local_boundary_pack_combined_v1.geojson'),
      fetch('./UAE_Emirates_Boundaries.geojson')
    ]);
    localPack = await packRes.json();
    emiratesGeo = await emiratesRes.json();
    drawEmirates();
  } catch(err) {
    console.error('Failed to load boundary files', err);
    document.getElementById('areaList').innerHTML = '<div class="empty">Map data unavailable.</div>';
  }
})();

function drawEmirates() {
  if (!isStyleReady || !emiratesGeo) return;
  if (map.getSource('emirates')) {
    map.getSource('emirates').setData(emiratesGeo);
    return;
  }
  map.add
